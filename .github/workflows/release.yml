name: Validate Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Validate skill structure
        run: |
          SKILLS_DIR="skills"
          ERROR_COUNT=0

          if [ ! -d "$SKILLS_DIR" ]; then
            echo "ERROR: skills/ directory not found"
            exit 1
          fi

          for skill_dir in "$SKILLS_DIR"/*/; do
            skill_name=$(basename "$skill_dir")

            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "ERROR: SKILL.md not found in $skill_name"
              ((ERROR_COUNT++))
              continue
            fi

            # Validate frontmatter syntax
            if head -1 "$skill_dir/SKILL.md" | grep -q "^---$"; then
              if tail -n +2 "$skill_dir/SKILL.md" | grep -q "^---$"; then
                echo "✓ $skill_name"
              else
                echo "ERROR: Missing closing --- in $skill_name/SKILL.md"
                ((ERROR_COUNT++))
              fi
            else
              echo "ERROR: $skill_name/SKILL.md does not start with ---"
              ((ERROR_COUNT++))
            fi
          done

          if [ $ERROR_COUNT -gt 0 ]; then
            echo "Found $ERROR_COUNT validation error(s)"
            exit 1
          fi

      - name: Generate changelog
        run: |
          TAG=${{ steps.version.outputs.tag }}
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          bash scripts/generate-release-notes.sh \
            --tag "${TAG}" \
            --previous-tag "${PREVIOUS_TAG}" \
            --output release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAG=${{ steps.version.outputs.tag }}

          gh release create "${TAG}" \
            --title "cogworks v${VERSION}" \
            --notes-file release-notes.md \
            --draft=false
