name: Pre-Release Validation

on:
  pull_request:
    paths:
      - "plugin.json"
      - ".claude-plugin/**"
      - "agents/**"
      - "plugin/**"
      - "skills/**"
      - ".claude/agents/**"
      - ".github/agents/**"
      - "tests/**"
      - "scripts/**"
      - "README.md"
      - "INSTALL.md"
      - "TESTING.md"
      - "CONTRIBUTIONS.md"
      - "LICENSE"
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required skills
        run: |
          for skill in cogworks cogworks-encode cogworks-learn; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "ERROR: Missing required skill: $skill"
              exit 1
            fi
            echo "✓ $skill"
          done

      - name: Validate all skills have SKILL.md
        run: |
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "ERROR: SKILL.md not found in $skill_name"
              exit 1
            fi
            echo "✓ $skill_name"
          done

      - name: Validate testing framework
        run: |
          TEST_FRAMEWORK_DIR="tests/framework"
          if [ ! -d "$TEST_FRAMEWORK_DIR" ]; then
            echo "ERROR: testing framework directory not found at $TEST_FRAMEWORK_DIR"
            exit 1
          fi
          if [ ! -x "tests/framework/graders/deterministic-checks.sh" ]; then
            echo "ERROR: deterministic checks script missing/executable bit not set"
            exit 1
          fi
          if [ ! -f "tests/framework/scripts/cogworks-eval.py" ]; then
            echo "ERROR: cogworks-eval.py not found"
            exit 1
          fi
          echo "✓ testing framework present"

      - name: Install Python dependencies
        run: pip install jsonschema

      - name: Validate native agent renderings
        run: |
          python3 scripts/render-agentic-role-bindings.py --check

      - name: Validate plugin skill renderings
        run: |
          python3 scripts/render-plugin-skills.py --check

      - name: Run all test suites
        run: |
          bash tests/run-all.sh

      - name: Summary
        if: success()
        run: |
          echo "✓ All validations passed"
