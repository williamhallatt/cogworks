name: Pre-Release Validation

on:
  pull_request:
    paths:
      - "skills/**"

      - "tests/**"
      - "scripts/**"
      - "README.md"
      - "INSTALL.md"
      - "TESTING.md"
      - "LICENSE"
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required skills
        run: |
          for skill in cogworks cogworks-encode cogworks-learn; do
            if [ ! -f "skills/$skill/SKILL.md" ]; then
              echo "ERROR: Missing required skill: $skill"
              exit 1
            fi
            echo "✓ $skill"
          done

      - name: Validate all skills have SKILL.md
        run: |
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "ERROR: SKILL.md not found in $skill_name"
              exit 1
            fi
            echo "✓ $skill_name"
          done

      - name: Validate symlinks
        run: |
          for link in .claude/skills/*; do
            link_name=$(basename "$link")
            if [ -L "$link" ]; then
              if [ -e "$link/SKILL.md" ]; then
                echo "✓ symlink $link_name resolves"
              else
                echo "ERROR: symlink $link_name broken"
                exit 1
              fi
            fi
          done

      - name: Validate testing framework
        run: |
          TEST_FRAMEWORK_DIR="tests/framework"
          if [ ! -d "$TEST_FRAMEWORK_DIR" ]; then
            echo "ERROR: testing framework directory not found at $TEST_FRAMEWORK_DIR"
            exit 1
          fi
          if [ ! -x "tests/framework/graders/deterministic-checks.sh" ]; then
            echo "ERROR: deterministic checks script missing/executable bit not set"
            exit 1
          fi
          if [ ! -f "tests/framework/scripts/cogworks-eval.py" ]; then
            echo "ERROR: cogworks-eval.py not found"
            exit 1
          fi
          echo "✓ testing framework present"

      - name: Behavioral tests (cogworks-*)
        run: |
          echo "⚠️  Behavioral evaluation pending reconstruction (D-022/D-023)."
          echo "    Behavioral traces were deleted — they were circular LLM ground truth."
          echo "    Capture scripts have been removed. DO NOT regenerate."
          echo "    Parker is defining replacement quality ground truth."
          echo "    See .squad/agents/parker/charter.md"
          echo "    Skipping this step."

      - name: Framework black-box tests
        run: |
          bash tests/run-black-box-tests.sh

      - name: Summary
        if: success()
        run: |
          echo "✓ All validations passed"
