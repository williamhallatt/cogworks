name: benchmark

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Offline smoke
        run: |
          bash bench/scripts/run-protocol-benchmark.sh \
            --protocol bench/protocols/protocol-pilot.json \
            --mode offline \
            --run-id ci-pilot-smoke \
            --force
      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-pilot-smoke
          path: bench/results/pipeline-benchmark/ci-pilot-smoke/

  real:
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ false }} # Enable when codex auth/runtime is configured in CI
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Hard real benchmark
        env:
          BENCH_MODEL_FAMILY: gpt-5-codex
        run: |
          bash bench/scripts/run-protocol-benchmark.sh \
            --protocol bench/protocols/protocol-hard-v2.json \
            --mode real \
            --repeats 3 \
            --run-id ci-hard-real \
            --force
      - name: Upload real artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-hard-real
          path: bench/results/pipeline-benchmark/ci-hard-real/
